name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + build (web + mcp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Test web
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: test-anon-key-not-real
        run: npm test

      - name: Build web
        run: npm run build

      - name: Install MCP dependencies
        working-directory: mcp
        run: npm ci

      - name: Test MCP
        working-directory: mcp
        run: npm test

      - name: Build MCP
        working-directory: mcp
        run: npm run build
