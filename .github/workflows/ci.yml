name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + build (web + mcp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Test web
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: test-anon-key-not-real
        run: npm test

      - name: Build web
        run: npm run build

      - name: Install MCP dependencies
        working-directory: mcp
        run: npm ci

      # mcp tests now include db.test.ts + userResolver.test.ts which exercise
      # the pg.Pool + withUserContext helpers against a real Postgres. Start
      # embedded pg + apply migrations + insert a CI user before running them.
      - name: Start embedded Postgres + apply migrations (Tier 0)
        env:
          DATABASE_URL: postgres://plannen:plannen@127.0.0.1:54322/plannen
          PLANNEN_TIER: '0'
        run: |
          nohup node scripts/lib/plannen-pg.mjs init >> /tmp/pg.log 2>&1 &
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 54322 2>/dev/null; then break; fi
            sleep 1
          done
          node scripts/lib/migrate.mjs
          node -e "const pg=require('pg');(async()=>{const c=new pg.Client({connectionString:process.env.DATABASE_URL});await c.connect();await c.query(\"INSERT INTO auth.users (id, email) VALUES (gen_random_uuid(), 'ci@plannen.local') ON CONFLICT (id) DO NOTHING\");await c.end();})()"

      - name: Test MCP
        working-directory: mcp
        env:
          DATABASE_URL: postgres://plannen:plannen@127.0.0.1:54322/plannen
          PLANNEN_TIER: '0'
          PLANNEN_USER_EMAIL: ci@plannen.local
        run: npm test

      - name: Build MCP
        working-directory: mcp
        run: npm run build

      # supabase/functions vitest covers the pure-logic handlers in
      # _shared/handlers/ AND the Tier-1 HTTP MCP under supabase/functions/mcp/.
      # No live Supabase needed — tests use mocked clients.
      - name: Install supabase/functions dependencies
        working-directory: supabase/functions
        run: npm install

      - name: Test supabase/functions (handlers + HTTP MCP)
        working-directory: supabase/functions
        run: npm test
