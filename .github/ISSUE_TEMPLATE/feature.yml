name: Feature request
description: Suggest an idea or enhancement for Plannen.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For very large changes, a [Discussion](https://github.com/pariksheet/plannen/discussions) is often the better starting point.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who feels the pain today and how?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Plannen to behave? Sketch the UX, the data model, the slash command, whatever's relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why is the proposal above the right call?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Where does this fit?
      multiple: true
      options:
        - Web app (src/)
        - MCP server (mcp/)
        - Edge functions (supabase/functions/)
        - Claude Code plugin (plugin/)
        - Bootstrap / scripts
        - Documentation
        - Other / not sure
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, references, related projects, prior art.
    validations:
      required: false
