name: Bug report
description: Something in Plannen isn't working as expected.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete you can be about what went wrong and how to reproduce it, the faster it gets fixed.

        If this is a **security** issue, please don't file it here — use [GitHub Security Advisories](https://github.com/pariksheet/plannen/security/advisories/new) instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you see? What did you expect to see?
      placeholder: |
        I tried to ... and instead of ... I got ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal list of steps someone else can follow to see the same thing. Include the exact prompt if Claude was involved.
      placeholder: |
        1. Run `bash scripts/bootstrap.sh`
        2. In Claude Code, type: "schedule a swim class for Saturday"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: |
        Paste the output of:

        ```bash
        node --version
        supabase --version
        uname -a   # macOS/Linux  — on Windows, `ver`
        git -C . rev-parse HEAD
        ```
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      description: |
        Anything from `.plannen/functions.log`, the browser console, or the Claude Code session that helps locate the issue. Redact secrets.
      render: shell
    validations:
      required: false
