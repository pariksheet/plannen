<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: sans-serif; padding: 24px; color: #1f2937;">
  <h2 style="color: #4f46e5;">Sign in to Plannen</h2>
  <p>Click the button below to sign in. This link expires in 1 hour.</p>
  <p>
    <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=magiclink"
       style="display:inline-block;padding:12px 24px;background:#4f46e5;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">
      Sign in
    </a>
  </p>
  <p style="margin-top:24px;">Or enter this 6-digit code in the app:</p>
  <p style="font-size:28px;letter-spacing:6px;font-weight:700;color:#1f2937;background:#f3f4f6;padding:12px 20px;border-radius:6px;display:inline-block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">{{ .Token }}</p>
  <p style="color:#6b7280;font-size:12px;">If you didn't request this, you can ignore this email.</p>
</body>
</html>
